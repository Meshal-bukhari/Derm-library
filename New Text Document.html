            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

            background-color: #c82333;
        }

        .page-title {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 2em;
        }

            color: #343a40;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.4em;
            border-left: 5px solid var(--review-color);
            padding-left: 10px;
        }

        .qa-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-left: 5px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 15px 20px;
            box-shadow: var(--shadow);
            transition: border-color 0.3s ease;
        }

        .qa-item.correct {
            border-left-color: var(--correct-color);
        }

        .qa-item.review {
            border-left-color: var(--review-color);
        }

        .question {
            cursor: pointer;
            font-weight: 600;
        }

        .question::after {
            content: ' (Click to reveal)';
            font-size: 0.8em;
            color: #6c757d;
            font-weight: normal;
        }
        
        .answer-revealed .question::after {
            content: '';
        }

        .answer {
            display: none;
            margin-top: 12px;
            padding: 12px;
            background-color: #f8f9fa;
            border-radius: 6px;
            border-left: 3px solid var(--primary-color);
        }

        .controls {
            display: none;
            margin-top: 15px;
            text-align: right;
        }
        
        .answer-revealed .controls {
            display: block;
        }

        .controls button {
            border: none;
            padding: 8px 16px;
            margin-left: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.1s;
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .btn-correct {
            background-color: var(--correct-color);
            color: white;
        }

        .btn-review {
            background-color: var(--review-color);
            color: white;
        }

        .instructions {
            background-color: #e9ecef;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-color);
        }
        
        .instructions p {
            margin: 0;
        }

    </style>

            const container = document.getElementById('qa-container');
            let qaCounter = 0;

            const lines = rawText.split('\n');
            let currentSection = null;

            lines.forEach(line => {
                line = line.trim();
                if (!line || line.startsWith('---') || line.endsWith('HNB2025')) {
                    return;
                }

                if (line.startsWith('******')) {
                    const pageTitle = line.replace(/\*/g, '').trim();
                    const h2 = document.createElement('h2');
                    h2.className = 'page-title';
                    h2.textContent = pageTitle;
                    container.appendChild(h2);
                    currentSection = null;
                } else if (line.startsWith('•') || /^[A-Z]/.test(line) && !line.includes(':') && !line.includes('→') && line.split(' ').length < 5) {
                    // Heuristic for section titles: starts with capital, few words, no separator
                    const sectionTitleText = line.replace(/^•\s*/, '').trim();
                     if (sectionTitleText.length > 50) { // If it's too long, it's likely a question
                        createQAItem(line);
                        return;
                    }
                    const h3 = document.createElement('h3');
                    h3.className = 'section-title';
                    h3.textContent = sectionTitleText;
                    container.appendChild(h3);
                    currentSection = h3;
                } else {
                    createQAItem(line);
                }
            });
            
            function createQAItem(line) {
                qaCounter++;
                const qaId = `qa-item-${qaCounter}`;
                let questionText = '';
                let answerText = '';
                
                let separator = null;
                if(line.includes(':')) separator = ':';
                else if(line.includes('→')) separator = '→';
                else if(line.includes('?')) separator = '?';

                if (separator) {
                    const parts = line.split(separator);
                    questionText = parts.shift().trim();
                    answerText = parts.join(separator).trim();
                } else {
                    questionText = line;
                    answerText = "Self-review this concept.";
                }

                questionText = questionText.replace(/^•\s*/, '').replace(/^0\s*/, '').replace(/^[-\d]+\.\s*/, '').trim();

                if (!questionText) return;

                const item = document.createElement('div');
                item.className = 'qa-item';
                item.id = qaId;

                item.innerHTML = `
                    <div class="question">${questionText}</div>
                    <div class="answer">${answerText.replace(/\n/g, '<br>')}</div>
                    <div class="controls">
                        <button class="btn-review">Review</button>
                        <button class="btn-correct">Got it!</button>
                    </div>
                `;
                container.appendChild(item);
            }

            // --- Interactivity and State Management ---
            const allQAItems = document.querySelectorAll('.qa-item');
            const progressTracker = document.getElementById('progress-tracker');
            const restartBtn = document.getElementById('restart-btn');

            function updateProgress() {
                const total = allQAItems.length;
                const answered = document.querySelectorAll('.qa-item.correct, .qa-item.review').length;
                progressTracker.textContent = `Progress: ${answered}/${total}`;
            }

            function loadState() {
                allQAItems.forEach(item => {
                    const state = localStorage.getItem(item.id);
                    if (state === 'correct') {
                        item.classList.add('correct');
                    } else if (state === 'review') {
                        item.classList.add('review');
                    }
                });
                updateProgress();
            }

            allQAItems.forEach(item => {
                const questionDiv = item.querySelector('.question');
                
                questionDiv.addEventListener('click', () => {
                    const answerDiv = item.querySelector('.answer');
                    item.classList.toggle('answer-revealed');
                    answerDiv.style.display = answerDiv.style.display === 'block' ? 'none' : 'block';
                });

                const correctBtn = item.querySelector('.btn-correct');
                correctBtn.addEventListener('click', () => {
                    item.classList.add('correct');
                    item.classList.remove('review');
                    localStorage.setItem(item.id, 'correct');
                    updateProgress();
                });

                const reviewBtn = item.querySelector('.btn-review');
                reviewBtn.addEventListener('click', () => {
                    item.classList.add('review');
                    item.classList.remove('correct');
                    localStorage.setItem(item.id, 'review');
                    updateProgress();
                });
            });

            restartBtn.addEventListener('click', () => {
                if (confirm('Are you sure you want to restart and clear all your progress?')) {
                    allQAItems.forEach(item => {
                        localStorage.removeItem(item.id);
                    });
                    location.reload();
                }
            });

            // Initial Load
            loadState();
        });
    </script>
