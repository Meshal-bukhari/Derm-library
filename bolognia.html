const grouped = {};
chapters.forEach(ch => { const l = ch.title[0].toUpperCase(); if (!grouped[l]) grouped[l] = []; grouped[l].push(ch); });
const letters = Object.keys(grouped).sort();

const alphaBar = document.getElementById('alphaBar');
const allBtn = document.createElement('button');
allBtn.className = 'alpha-btn alpha-all active'; allBtn.textContent = 'All'; allBtn.dataset.letter = 'ALL';
alphaBar.appendChild(allBtn);
'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
  const b = document.createElement('button');
  b.className = 'alpha-btn' + (grouped[l] ? '' : ' empty'); b.textContent = l; b.dataset.letter = l;
  alphaBar.appendChild(b);
});

const container = document.getElementById('chaptersContainer');
const sectionMap = {};
letters.forEach(letter => {
  const sec = document.createElement('div');
  sec.className = 'letter-section'; sec.id = 'sec-' + letter;
  sec.innerHTML = `<div class="letter-header"><span class="letter-char">${letter}</span><div class="letter-line"></div><span class="letter-count">${grouped[letter].length} chapter${grouped[letter].length > 1 ? 's' : ''}</span></div><div class="chapter-grid" id="g-${letter}"></div>`;
  container.appendChild(sec); sectionMap[letter] = sec;
  const grid = sec.querySelector(`#g-${letter}`);
  grouped[letter].forEach(ch => {
    const card = document.createElement('a');
    card.className = 'chapter-card'; card.href = ch.file; card.target = '_blank'; card.rel = 'noopener noreferrer'; card.dataset.title = ch.title.toLowerCase();
    card.innerHTML = `<div class="card-icon"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg></div><div class="card-body"><div class="card-title">${ch.title}</div></div><svg class="card-arrow" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>`;
    grid.appendChild(card);
  });
});

let activeFilter = 'ALL';
alphaBar.addEventListener('click', e => {
  const btn = e.target.closest('.alpha-btn');
  if (!btn || btn.classList.contains('empty')) return;
  alphaBar.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
  activeFilter = btn.dataset.letter;
  letters.forEach(l => sectionMap[l].classList.toggle('hidden', activeFilter !== 'ALL' && l !== activeFilter));
  if (activeFilter !== 'ALL' && sectionMap[activeFilter]) sectionMap[activeFilter].scrollIntoView({ behavior: 'smooth', block: 'start' });
  doSearch();
});

const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const searchCount = document.getElementById('searchCount');
const noResults = document.getElementById('noResults');

function doSearch() {
  const q = searchInput.value.trim().toLowerCase();
  clearBtn.style.display = q ? 'block' : 'none';
  let total = 0;
  letters.forEach(l => {
    const sec = sectionMap[l];
    if (activeFilter !== 'ALL' && l !== activeFilter) { sec.classList.add('hidden'); return; }
    let vis = 0;
    sec.querySelectorAll('.chapter-card').forEach(card => { const ok = !q || card.dataset.title.includes(q); card.classList.toggle('hidden', !ok); if (ok) vis++; });
    sec.classList.toggle('hidden', vis === 0); total += vis;
  });
  noResults.style.display = total === 0 ? 'block' : 'none';
  searchCount.textContent = q ? `${total} result${total !== 1 ? 's' : ''}` : `${chapters.length} chapters`;
}

searchInput.addEventListener('input', doSearch);
clearBtn.addEventListener('click', () => { searchInput.value = ''; searchInput.focus(); doSearch(); });
searchCount.textContent = `${chapters.length} chapters`;
</script>
</body>
</html>
